<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Y-login</title>
</head>
<body>
      <div class="form">
          <form action="">
              <h1> Login </h1>
            <div class="input">
                      <!-- email -->
                <label for="">Your email</label>
                <input type="email" placeholder="Name" class="input-value">
                     <!-- password -->
                <label for="">Your Password</label>
                <input type="password" placeholder="Password" class="input-value">
                     <!-- confirm password -->
                <label for="">Confirm Password</label>
                <input type="password" placeholder="Confirm Password" class="input-value">
              </div>

              <div class="check">
                <input id="cc" type="checkbox" class="check-input" >
                <label for="cc">Do you have a accound? </label>
                <a href="/register-form.html">Registr</a>
              </div>

              <div class="btn">
                <button><a href="/register-form.html"></a> Login</button>
              </div>
          
    </form>
  </div>
</body>
</html>
